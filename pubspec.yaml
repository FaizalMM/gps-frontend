name: mobitra
description: Mobitra - School Bus GPS Tracker App
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  provider: ^6.1.2
  shared_preferences: ^2.3.2
  intl: ^0.19.0
  mobile_scanner: ^5.2.3
  flutter_map: ^7.0.2
  latlong2: ^0.9.1
  geolocator: ^13.0.2
  image_picker: ^0.8.9
  permission_handler: ^11.3.1
  qr_flutter: ^4.1.0
  cached_network_image: ^3.4.1

  http: any
  flutter_secure_storage: any
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/logo.png
  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Regular.ttf
        - asset: assets/fonts/Poppins-Medium.ttf
          weight: 500
        - asset: assets/fonts/Poppins-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Poppins-Bold.ttf
          weight: 700
        - asset: assets/fonts/Poppins-ExtraBold.ttf
          weight: 800

flutter_launcher_icons:
  android: true
  ios: false

  image_path: "assets/images/icon2.png"

  adaptive_icon_background: "#F0F0E8"
  adaptive_icon_foreground: "assets/images/icon2.png"
